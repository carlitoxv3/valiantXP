name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ValiantXP.sln

    - name: Build solution
      run: dotnet build ValiantXP.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test ValiantXP.sln --configuration Release --no-restore --verbosity normal

    - name: Create release package
      run: dotnet publish ValiantXP.API/ValiantXP.API.csproj --configuration Release -o publish-folder --no-build

    - name: Upload Release Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ValiantXP-API-Release
        path: publish-folder/
